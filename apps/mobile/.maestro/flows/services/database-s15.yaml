# S-15: SQLite database — init, tables, CRUD, cascade, FK enforcement
appId: com.fillit.app
tags:
  - services
  - regression
---
- launchApp:
    clearState: true

# Navigate to E2E test harness
- tapOn: "FillIt"
- runFlow: ../../navigate-to-e2e.yaml

# Run database suite
- tapOn:
    id: "e2e-run-database"
- extendedWaitUntil:
    visible:
      id: "suite-database"
    timeout: 15000

# Assert all tests passed (no fail results)
- assertVisible: "Database (S-15)"
- assertNotVisible: "\u274C"

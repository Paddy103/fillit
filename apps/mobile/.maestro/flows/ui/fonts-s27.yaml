# S-27: Custom fonts — verify app loads without font fallback crash
appId: com.fillit.app
tags:
  - ui
  - regression
---
- launchApp:
    clearState: true

# If fonts fail to load, the app either crashes or shows nothing.
# A successful render of styled text proves fonts loaded.
- assertVisible: 'FillIt'
- assertVisible: 'Scan, fill, and export documents with ease.'

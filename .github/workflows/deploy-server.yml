name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm -r --if-present run lint

      - name: Prettier
        run: pnpm run format:check

      - name: TypeScript type check
        run: pnpm -r --if-present run typecheck

      - name: Run tests
        run: pnpm -r --if-present run test

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Trigger Render deploy
        run: |
          response=$(curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Deploy triggered: $response"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            response=$(curl -sf https://${{ secrets.RENDER_SERVICE_URL }}/health 2>/dev/null) && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

          echo "Health response: $response"
          echo "$response" | grep -q '"status":"ok"' || {
            echo "Health check failed: status is not ok"
            exit 1
          }
          echo "Health check passed"

  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: smoke-test
    if: failure()
    steps:
      - name: Get previous successful deploy
        id: prev-deploy
        run: |
          deploys=$(curl -sf -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=10")

          previous_id=$(echo "$deploys" | jq -r '[.[] | select(.deploy.status == "live")] | .[0].deploy.id')
          echo "deploy_id=$previous_id" >> "$GITHUB_OUTPUT"
          echo "Rolling back to deploy: $previous_id"

      - name: Rollback to previous deploy
        if: steps.prev-deploy.outputs.deploy_id != 'null'
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys/${{ steps.prev-deploy.outputs.deploy_id }}/rollback"
          echo "Rollback initiated"

      - name: Verify rollback health
        if: steps.prev-deploy.outputs.deploy_id != 'null'
        run: |
          sleep 30
          response=$(curl -sf --retry 3 --retry-delay 10 https://${{ secrets.RENDER_SERVICE_URL }}/health)
          echo "Post-rollback health: $response"
          echo "$response" | grep -q '"status":"ok"' || {
            echo "WARNING: Rollback health check also failed"
            exit 1
          }
          echo "Rollback successful"

name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'packages/shared/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  FLY_APP: fillit-server

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm -r --if-present run lint

      - name: Prettier
        run: pnpm run format:check

      - name: TypeScript type check
        run: pnpm -r --if-present run typecheck

      - name: Run tests
        run: pnpm -r --if-present run test

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-action/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --config apps/server/fly.toml --dockerfile apps/server/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 15

      - name: Health check
        run: |
          response=$(curl -sf --retry 3 --retry-delay 5 https://fillit-server.fly.dev/health)
          echo "Health response: $response"
          echo "$response" | grep -q '"status":"ok"' || {
            echo "Health check failed: status is not ok"
            exit 1
          }
          echo "Health check passed"

  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: smoke-test
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-action/setup-flyctl@master

      - name: Get previous release image
        id: prev-release
        run: |
          previous_image=$(flyctl releases --config apps/server/fly.toml --json | jq -r '.[1].ImageRef')
          echo "image=$previous_image" >> "$GITHUB_OUTPUT"
          echo "Rolling back to image: $previous_image"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Rollback to previous release
        run: |
          flyctl deploy --config apps/server/fly.toml --image "${{ steps.prev-release.outputs.image }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify rollback health
        run: |
          sleep 10
          response=$(curl -sf --retry 3 --retry-delay 5 https://fillit-server.fly.dev/health)
          echo "Post-rollback health: $response"
          echo "$response" | grep -q '"status":"ok"' || {
            echo "WARNING: Rollback health check also failed"
            exit 1
          }
          echo "Rollback successful"

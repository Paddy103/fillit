name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20'

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ ! "$BRANCH" =~ ^feature/(S|E|F)-[0-9]+-[a-z0-9-]+$ ]]; then
            echo "::warning::Branch name '$BRANCH' doesn't follow convention: feature/<story-id>-<short-name>"
          fi

      - name: Check commit messages
        run: |
          COMMITS=$(git log --format="%s" origin/${{ github.base_ref }}..${{ github.sha }})
          echo "Checking commit messages..."
          echo "$COMMITS" | while read -r msg; do
            if [[ ! "$msg" =~ ^(feat|fix|test|refactor|docs|chore|style|perf|ci|build|revert)(\(.+\))?!?:\ .+ ]]; then
              echo "::warning::Commit message doesn't follow Conventional Commits: $msg"
            fi
          done

      - name: Check for large files
        run: |
          # Flag files larger than 1MB
          find . -type f -size +1M -not -path "./.git/*" -not -path "*/node_modules/*" | while read -r f; do
            echo "::warning::Large file detected: $f ($(du -h "$f" | cut -f1))"
          done

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check docs were updated
        run: |
          # Get changed source files (non-docs, non-config)
          SRC_CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(ts|tsx|js|jsx|json)$' | grep -v 'package-lock\|pnpm-lock\|node_modules' | wc -l)
          DOC_CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.md$' | wc -l)

          echo "Source files changed: $SRC_CHANGES"
          echo "Documentation files changed: $DOC_CHANGES"

          if [ "$SRC_CHANGES" -gt 0 ] && [ "$DOC_CHANGES" -eq 0 ]; then
            echo "::warning::Source code was changed but no documentation files (.md) were updated. Please ensure READMEs and CLAUDE.md are up to date."
          fi

      - name: Check for broken doc links
        run: |
          # Find markdown files and check for broken relative links
          for md in $(find . -name "*.md" -not -path "*/node_modules/*" -not -path "*/.git/*"); do
            # Extract relative links like [text](path/to/file)
            grep -oP '\[.*?\]\(\K[^)#]+' "$md" 2>/dev/null | while read -r link; do
              # Skip URLs and anchors
              if [[ "$link" =~ ^https?:// ]] || [[ "$link" =~ ^mailto: ]]; then
                continue
              fi
              # Resolve relative to the markdown file's directory
              dir=$(dirname "$md")
              target="$dir/$link"
              if [ ! -e "$target" ]; then
                echo "::warning file=$md::Broken link: [$link] - target does not exist"
              fi
            done
          done

  label:
    name: Auto-label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Label by file changes
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

name: Dev Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─── Stage 1: Lint & Type Check ───
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: ESLint
        run: pnpm run lint

      - name: Prettier check
        run: pnpm run format:check

  # ─── Stage 2: Unit & Integration Tests ───
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  # ─── Stage 3: Security Audit ───
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ─── Stage 4: Build ───
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: cd packages/shared && pnpm run build
        continue-on-error: true # Build script added in later stories

      - name: Verify workspace resolution
        run: pnpm ls -r

  # ─── Stage 5: Deploy (main branch only) ───
  deploy-server:
    name: Deploy Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: cd apps/server && flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ─── Stage 6: Post-Deploy Smoke Test ───
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-server
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Wait for deployment
        run: sleep 30

      - name: Run smoke tests
        run: |
          # Health check
          curl -sf ${{ vars.SERVER_URL }}/health || exit 1
          echo "Health check passed"

          # Basic API smoke test
          curl -sf ${{ vars.SERVER_URL }}/api/v1/status || exit 1
          echo "API status check passed"
        env:
          SERVER_URL: ${{ vars.SERVER_URL || 'https://fillit-api.fly.dev' }}

  # ─── Summary ───
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, test, security, build]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Types | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any stage failed
        if: contains(needs.*.result, 'failure')
        run: exit 1

  # ─── PR Failure Alert: Comment on PR with failure details ───
  pr-failure-alert:
    name: PR Failure Alert
    runs-on: ubuntu-latest
    needs: [lint, test, security, build]
    if: always() && github.event_name == 'pull_request' && contains(needs.*.result, 'failure')
    steps:
      - name: Comment failure summary on PR
        uses: actions/github-script@v7
        with:
          script: |
            const stages = {
              'Lint & Type Check': '${{ needs.lint.result }}',
              'Tests': '${{ needs.test.result }}',
              'Security Audit': '${{ needs.security.result }}',
              'Build': '${{ needs.build.result }}',
            };

            const failed = Object.entries(stages)
              .filter(([, status]) => status === 'failure')
              .map(([name]) => name);

            const passed = Object.entries(stages)
              .filter(([, status]) => status === 'success')
              .map(([name]) => name);

            const skipped = Object.entries(stages)
              .filter(([, status]) => status === 'skipped' || status === 'cancelled')
              .map(([name]) => name);

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              `## CI Failed`,
              '',
              '| Stage | Status |',
              '|-------|--------|',
              ...Object.entries(stages).map(([name, status]) => {
                const icon = status === 'success' ? '✅' : status === 'failure' ? '❌' : '⏭️';
                return `| ${name} | ${icon} ${status} |`;
              }),
              '',
              `**Failed stages:** ${failed.join(', ')}`,
              '',
              `[View full logs](${runUrl})`,
            ].join('\n');

            // Check for existing CI failure comment to avoid spam
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 50,
            });

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('## CI Failed')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ─── Main Branch Failure: Create bug issue ───
  main-failure-alert:
    name: Main Branch Failure Alert
    runs-on: ubuntu-latest
    needs: [lint, test, security, build]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && contains(needs.*.result, 'failure')
    steps:
      - name: Create CI failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const stages = {
              'Lint & Type Check': '${{ needs.lint.result }}',
              'Tests': '${{ needs.test.result }}',
              'Security Audit': '${{ needs.security.result }}',
              'Build': '${{ needs.build.result }}',
            };

            const failed = Object.entries(stages)
              .filter(([, status]) => status === 'failure')
              .map(([name]) => name);

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitSha = context.sha.substring(0, 7);
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;

            const title = `CI failure on main: ${failed.join(', ')} (${commitSha})`;

            // Check for duplicate open issue
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug:ci',
              per_page: 10,
            });

            const duplicate = existing.data.find(i => i.title === title);
            if (duplicate) {
              console.log(`Duplicate issue already exists: #${duplicate.number}`);
              return;
            }

            const body = [
              `## CI Pipeline Failure on \`main\``,
              '',
              `**Commit:** [\`${commitSha}\`](${commitUrl})`,
              `**Triggered by:** ${context.actor}`,
              '',
              '### Stage Results',
              '| Stage | Status |',
              '|-------|--------|',
              ...Object.entries(stages).map(([name, status]) => {
                const icon = status === 'success' ? '✅' : status === 'failure' ? '❌' : '⏭️';
                return `| ${name} | ${icon} ${status} |`;
              }),
              '',
              `[View full logs](${runUrl})`,
              '',
              '### Action Required',
              'The `main` branch build is broken. This blocks all PRs and deploys.',
              '',
              'Priority: **High** — fix immediately or revert the offending commit.',
            ].join('\n');

            // Create bug:ci label if it doesn't exist
            await github.rest.issues.createLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'bug:ci',
              color: 'B60205',
              description: 'CI pipeline failure on main',
            }).catch(() => {}); // ignore if exists

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug:ci'],
            });

  # ─── Deploy Failure: Create urgent issue ───
  deploy-failure-alert:
    name: Deploy Failure Alert
    runs-on: ubuntu-latest
    needs: [deploy-server, smoke-test]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && (needs.deploy-server.result == 'failure' || needs.smoke-test.result == 'failure')
    steps:
      - name: Create deploy failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const deployResult = '${{ needs.deploy-server.result }}';
            const smokeResult = '${{ needs.smoke-test.result }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitSha = context.sha.substring(0, 7);
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;

            const failedStage = deployResult === 'failure' ? 'Deploy to Fly.io' : 'Post-deploy smoke test';

            const title = `Deploy failure: ${failedStage} (${commitSha})`;

            // Check for duplicate
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug:deploy',
              per_page: 10,
            });

            const duplicate = existing.data.find(i => i.title === title);
            if (duplicate) {
              console.log(`Duplicate issue already exists: #${duplicate.number}`);
              return;
            }

            const body = [
              `## Deploy Failure`,
              '',
              `**Commit:** [\`${commitSha}\`](${commitUrl})`,
              `**Triggered by:** ${context.actor}`,
              '',
              '### Results',
              '| Stage | Status |',
              '|-------|--------|',
              `| Deploy to Fly.io | ${deployResult === 'success' ? '✅' : '❌'} ${deployResult} |`,
              `| Smoke Test | ${smokeResult === 'success' ? '✅' : smokeResult === 'failure' ? '❌' : '⏭️'} ${smokeResult} |`,
              '',
              `[View full logs](${runUrl})`,
              '',
              '### Action Required',
              deployResult === 'failure'
                ? 'The deploy to Fly.io failed. The previous version is still running. Check Fly.io logs and the deploy step output.'
                : 'The deploy succeeded but smoke tests failed. The new version may be broken in production. Check health endpoints and consider rolling back.',
              '',
              'Priority: **Critical** — production may be affected.',
            ].join('\n');

            // Create bug:deploy label if it doesn't exist
            await github.rest.issues.createLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'bug:deploy',
              color: 'D93F0B',
              description: 'Deploy or post-deploy failure',
            }).catch(() => {}); // ignore if exists

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug:deploy'],
            });
